<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#42a5f5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1976d2;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="doorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1976d2;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background with gradient -->
  <rect fill="url(#bgGrad)" width="512" height="512" rx="112"/>
  
  <!-- House shape with shadow -->
  <g filter="url(#shadow)">
    <!-- Roof -->
    <path d="M256 140 L380 230 L380 380 L132 380 L132 230 Z" fill="white"/>
    
    <!-- Door -->
    <rect x="216" y="280" width="80" height="100" rx="8" fill="url(#doorGrad)"/>
    
    <!-- Door knob -->
    <circle cx="270" cy="330" r="6" fill="white" opacity="0.9"/>
    
    <!-- Windows -->
    <rect x="160" y="250" width="40" height="40" rx="4" fill="url(#doorGrad)" opacity="0.8"/>
    <rect x="312" y="250" width="40" height="40" rx="4" fill="url(#doorGrad)" opacity="0.8"/>
    
    <!-- Window panes -->
    <line x1="180" y1="250" x2="180" y2="290" stroke="white" stroke-width="2" opacity="0.5"/>
    <line x1="160" y1="270" x2="200" y2="270" stroke="white" stroke-width="2" opacity="0.5"/>
    <line x1="332" y1="250" x2="332" y2="290" stroke="white" stroke-width="2" opacity="0.5"/>
    <line x1="312" y1="270" x2="352" y2="270" stroke="white" stroke-width="2" opacity="0.5"/>
    
    <!-- Chimney -->
    <rect x="300" y="160" width="30" height="50" fill="#e53935" opacity="0.9"/>
    
    <!-- Smoke -->
    <circle cx="315" cy="145" r="8" fill="white" opacity="0.6"/>
    <circle cx="320" cy="135" r="6" fill="white" opacity="0.5"/>
    <circle cx="310" cy="130" r="5" fill="white" opacity="0.4"/>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="256" cy="180" r="12" fill="white" opacity="0.3"/>
</svg>
